name: Build

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            cmake \
            qt6-base-dev \

      - name: Build project
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . -j 8
